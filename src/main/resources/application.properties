spring.application.name=pb215

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.profiles.active=dev

spring.flyway.locations=classpath:db/db.migration
spring.flyway.sql-migration-prefix=mv
spring.flyway.sql-migration-separator=_

# CORS allowed frontend origin(s). Override in production with env var APP_FRONTEND_URL
app.frontend.url=http://localhost:5173